</div>

const MUTED = '#8B95A8';
const GRID = 'rgba(255,255,255,0.06)';
const BLUE = '#C84A1E', CORAL = '#E5703D';
Chart.defaults.color = MUTED;
Chart.defaults.font.family = 'system-ui, sans-serif';
Chart.defaults.font.size = 11;

function rec(y) { return TAX_DATA[String(y)] || null; }
function brackets(y, s) {
  const r = rec(y); if (!r || r.nt) return [];
  if (s === 's' && r.s) return r.s;
  if (s === 'hoh' && r.h) return r.h;
  if (s === 'mfs' && r.mfs) return r.mfs;
  return r.mfj || [];
}
function topRate(y) { const r = rec(y); if (!r || r.nt || !r.mfj) return 0; return Math.max(...r.mfj.map(b => b[0])); }
function topThresh(y) { const r = rec(y); if (!r || r.nt || !r.mfj) return 0; const t = topRate(y); const tier = r.mfj.find(b => b[0] === t); return tier ? tier[1] : 0; }
function fmtM(v) { if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M'; if (v >= 1e3) return '$' + Math.round(v/1e3) + 'k'; return '$' + Math.round(v); }
function fmtFull(v) { return '$' + Math.round(v).toLocaleString('en-US'); }

const allYears = Object.keys(TAX_DATA).map(Number).sort((a,b) => a-b);
const tlRates = allYears.map(y => topRate(y));
const tlCtx = document.getElementById('timelineChart').getContext('2d');
const tlChart = new Chart(tlCtx, {
  type: 'line',
  data: {
    labels: allYears,
    datasets: [
      { label: 'Top rate', data: tlRates, borderColor: BLUE, backgroundColor: BLUE + '22', borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 4, tension: 0.05, fill: true },
      { label: 'Selected', data: allYears.map(() => null), borderColor: '#F5F1EA', backgroundColor: '#F5F1EA', pointRadius: 0, showLine: false }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { display: false }, tooltip: { callbacks: { title: (i) => i[0].label, label: (i) => 'Top rate: ' + i.parsed.y.toFixed(1) + '%' } } },
    scales: { y: { beginAtZero: true, max: 100, ticks: { callback: (v) => v + '%', stepSize: 20 }, grid: { color: GRID } }, x: { ticks: { maxTicksLimit: 9, autoSkip: true }, grid: { display: false } } },
    onClick: (e, els) => { if (els.length) setYear(allYears[els[0].index]); }
  }
});

let curStatus = 'mfj';
let curYear = 2025;
let bChart = null;

function renderStats(y) {
  const r = rec(y);
  const g = document.getElementById('statGrid');
  if (!r || r.nt) {
    g.innerHTML = '<div class="stat"><p class="stat-label">Year</p><p class="stat-value">' + y + '</p></div><div class="stat"><p class="stat-label">Income tax</p><p class="stat-value">None</p><p class="stat-sub">No federal income tax</p></div>';
    return;
  }
  const top = topRate(y), topT = topThresh(y);
  const nb = (r.mfj || []).length;
  const bot = (r.mfj || []).length ? r.mfj[0][0] : 0;
  g.innerHTML = '<div class="stat"><p class="stat-label">Top marginal rate</p><p class="stat-value">' + top.toFixed(1) + '%</p><p class="stat-sub">on income over ' + fmtFull(topT) + '</p></div>' +
    '<div class="stat"><p class="stat-label">Bottom rate</p><p class="stat-value">' + bot.toFixed(1) + '%</p><p class="stat-sub">starts at $0</p></div>' +
    '<div class="stat"><p class="stat-label">Number of brackets</p><p class="stat-value">' + nb + '</p><p class="stat-sub">married filing jointly</p></div>';
}

function lerp(c1, c2, t) {
  const a = parseInt(c1.slice(1), 16), b = parseInt(c2.slice(1), 16);
  const ar = (a >> 16) & 255, ag = (a >> 8) & 255, ab = a & 255;
  const br = (b >> 16) & 255, bg = (b >> 8) & 255, bb = b & 255;
  const r = Math.round(ar + (br - ar) * t);
  const g = Math.round(ag + (bg - ag) * t);
  const bl = Math.round(ab + (bb - ab) * t);
  return '#' + ((r << 16) | (g << 8) | bl).toString(16).padStart(6, '0');
}

function renderBrackets(y, s) {
  const r = rec(y);
  const area = document.getElementById('bracketArea');
  document.getElementById('bracketYear').textContent = y;
  if (!r || r.nt) { area.innerHTML = '<div class="empty-state">No federal income tax in ' + y + '.</div>'; return; }
  const brs = brackets(y, s);
  if (!brs.length) { area.innerHTML = '<div class="empty-state">No bracket data.</div>'; return; }
  area.innerHTML = '<div style="position: relative; width: 100%; height: 280px;"><canvas id="bracketChart" role="img" aria-label="Marginal rate by bracket"></canvas></div>';
  const ctx = document.getElementById('bracketChart').getContext('2d');
  const labels = brs.map(b => fmtM(b[1]));
  const rates = brs.map(b => b[0]);
  const mx = Math.max(...rates);
  const colors = rates.map(rt => lerp('#3D5A7C', '#C84A1E', mx > 0 ? rt / mx : 0));
  if (bChart) bChart.destroy();
  bChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Rate', data: rates, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { title: (i) => 'Income above ' + i[0].label, label: (i) => 'Marginal rate: ' + i.parsed.y.toFixed(1) + '%' } } },
      scales: { y: { beginAtZero: true, max: Math.min(100, Math.ceil(mx / 10) * 10 + 5), ticks: { callback: (v) => v + '%' }, grid: { color: GRID } }, x: { ticks: { autoSkip: brs.length > 12, maxRotation: 45, minRotation: brs.length > 8 ? 30 : 0 }, grid: { display: false } } }
    }
  });
}

function renderNote(y) { const r = rec(y); document.getElementById('noteBox').textContent = (r && r.n) ? r.n : '(No notes recorded.)'; }

function highlight(y) {
  const i = allYears.indexOf(y);
  const ds = tlChart.data.datasets[1];
  ds.data = allYears.map(() => null);
  if (i >= 0) ds.data[i] = topRate(y);
  ds.pointRadius = allYears.map((_, j) => j === i ? 6 : 0);
  tlChart.update('none');
}

function setYear(y) {
  curYear = y;
  document.getElementById('yearOut').textContent = y;
  document.getElementById('yearSlider').value = y;
  renderStats(y); renderBrackets(y, curStatus); renderNote(y); highlight(y);
}
function setStatus(s) {
  curStatus = s;
  document.querySelectorAll('#statusPills .pill').forEach(p => p.classList.toggle('active', p.dataset.s === s));
  renderBrackets(curYear, s);
}

document.getElementById('yearSlider').addEventListener('input', (e) => setYear(parseInt(e.target.value, 10)));
document.querySelectorAll('#statusPills .pill').forEach(p => p.addEventListener('click', () => setStatus(p.dataset.s)));
document.querySelectorAll('.qbtn').forEach(b => b.addEventListener('click', () => setYear(parseInt(b.dataset.y, 10))));

setYear(2025);
</script>
